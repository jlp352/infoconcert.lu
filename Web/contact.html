<!DOCTYPE html>
<html lang="fr" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="site_title">infoConcert.lu – Contact</title>
    <link rel="icon" type="image/svg+xml" href="image/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF3366;
            --secondary: #FFD700;
            --dark: #0A0A0A;
            --gray: #1A1A1A;
            --light: #F5F5F5;
            --accent: #00D9FF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            color: var(--light);
            overflow-x: hidden;
        }

        /* Background animation */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.03;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 35px, var(--primary) 35px, var(--primary) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, var(--secondary) 35px, var(--secondary) 70px);
            animation: patternMove 60s linear infinite;
        }

        @keyframes patternMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(70px, 70px); }
        }

        /* Header */
        header {
            position: relative;
            padding: 2rem;
            background: linear-gradient(135deg, var(--gray) 0%, var(--dark) 100%);
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 10px 40px rgba(255, 51, 102, 0.2);
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--light);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            position: relative;
            transition: color 0.3s;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }

        nav a:hover { color: var(--primary); }
        nav a:hover::after { width: 100%; }

        nav a.active {
            color: var(--primary);
        }

        nav a.active::after {
            width: 100%;
        }

        /* Language switcher */
        .lang-switcher-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .lang-switcher {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .lang-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--light);
            border-radius: 20px;
            padding: 0.35rem 0.85rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .lang-btn.active {
            border-color: var(--accent);
            background: rgba(0, 217, 255, 0.15);
            color: var(--accent);
        }

        /* Page content */
        .page-content {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            padding: 6rem 2rem;
            text-align: center;
        }

        .page-content h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 6vw, 5rem);
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .page-content p {
            opacity: 0.5;
            font-size: 1.1rem;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 0.5; }
        }

        /* Footer */
        footer {
            position: relative;
            padding: 0 0 2rem;
            text-align: center;
            background: var(--dark);
        }

        footer p {
            opacity: 0.6;
            font-size: 0.9rem;
        }

        .footer-sep {
            margin: 0 0.6rem;
            opacity: 0.4;
        }

        .footer-legal {
            background: var(--dark);
            padding: 1.8rem 2rem 1.4rem;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .footer-legal a {
            color: rgba(245,245,245,0.5);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .footer-legal a:hover { color: var(--primary); }

        /* Cookie banner */
        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2000;
            background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
            border-top: 3px solid var(--primary);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            flex-wrap: wrap;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            animation: slideUpBanner 0.4s ease-out;
        }

        @keyframes slideUpBanner {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .cookie-banner-text {
            flex: 1;
            min-width: 220px;
            font-size: 0.88rem;
            line-height: 1.5;
            opacity: 0.85;
        }

        .cookie-banner-text strong { color: var(--accent); font-size: 0.95rem; }

        .cookie-banner-btns { display: flex; gap: 0.75rem; flex-shrink: 0; }

        .cookie-btn-accept {
            padding: 0.6rem 1.6rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
        }

        .cookie-btn-accept:hover { background: #ff5580; transform: translateY(-2px); }

        .cookie-btn-decline {
            padding: 0.6rem 1.6rem;
            background: transparent;
            color: var(--light);
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
        }

        .cookie-btn-decline:hover { border-color: var(--light); }

        /* Mobile */
        @media (max-width: 768px) {
            nav ul { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <header>
        <nav>
            <a href="index.html" class="logo"><img src="image/logo/Logo.png" alt="infoConcert.lu" style="height:90px;width:auto;display:block;"></a>
            <ul>
                <li><a href="index.html" data-i18n="nav_concerts">Concerts</a></li>
                <li><a href="venues.html" data-i18n="nav_venues">Lieux</a></li>
                <li><a href="contact.html" class="active" data-i18n="nav_contact">Contact</a></li>
            </ul>
            <div class="lang-switcher-wrapper">
                <div class="lang-switcher" id="lang-switcher">
                    <button class="lang-btn" data-lang="fr">FR</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="de">DE</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="page-content">
        <h1 data-i18n="page_title">Contact</h1>
        <p data-i18n="page_coming_soon">Contenu à venir.</p>
    </main>

    <footer>
        <div class="footer-legal">
            <a href="legalnotice.html#cookies" data-i18n="legal_cookies">Charte des cookies</a>
            <span class="footer-sep">·</span>
            <a href="legalnotice.html#cgu" data-i18n="legal_cgu">Conditions d'utilisation (CGU) du site</a>
            <span class="footer-sep">·</span>
            <a href="legalnotice.html#protection" data-i18n="legal_protection">Protection des données à caractère personnel</a>
        </div>
        <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 0 2rem;">
        <p data-i18n="footer_copy" style="padding-top: 1.5rem;">&copy; 2026 infoConcert.lu</p>
    </footer>

    <!-- Cookie consent banner -->
    <div class="cookie-banner" id="cookie-banner" style="display:none;">
        <div class="cookie-banner-text">
            <strong>🍪 Cookies</strong><br>
            <span id="cookie-banner-text"></span>
        </div>
        <div class="cookie-banner-btns">
            <button class="cookie-btn-accept" id="cookie-btn-accept"></button>
            <button class="cookie-btn-decline" id="cookie-btn-decline"></button>
        </div>
    </div>

    <script>
        function setCookie(name, value, days) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = `${name}=${encodeURIComponent(value)};expires=${expires};path=/;SameSite=Lax`;
        }

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
            return match ? decodeURIComponent(match[1]) : null;
        }

        function generateUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        const TRANSLATIONS = {
            fr: {
                site_title:       'infoConcert.lu – Contact',
                nav_concerts:     'Concerts',
                nav_venues:       'Lieux',
                nav_contact:      'Contact',
                page_title:       'Contact',
                page_coming_soon: 'Contenu à venir.',
                footer_copy:      '© 2026 infoConcert.lu',
                legal_cookies:    'Charte des cookies',
                legal_cgu:        'Conditions d\'utilisation (CGU) du site',
                legal_protection: 'Protection des données à caractère personnel',
                cookie_banner_text: 'Nous utilisons des cookies pour mémoriser votre identifiant et la date de votre dernière visite, afin de vous afficher les nouveaux concerts. Aucune donnée personnelle n\'est partagée.',
                cookie_accept:    'Accepter',
                cookie_decline:   'Refuser',
            },
            en: {
                site_title:       'infoConcert.lu – Contact',
                nav_concerts:     'Concerts',
                nav_venues:       'Venues',
                nav_contact:      'Contact',
                page_title:       'Contact',
                page_coming_soon: 'Content coming soon.',
                footer_copy:      '© 2026 infoConcert.lu',
                legal_cookies:    'Cookie Policy',
                legal_cgu:        'Terms of Use',
                legal_protection: 'Personal Data Protection',
                cookie_banner_text: 'We use cookies to remember your ID and your last visit date, so we can show you new concerts. No personal data is shared.',
                cookie_accept:    'Accept',
                cookie_decline:   'Decline',
            },
            de: {
                site_title:       'infoConcert.lu – Kontakt',
                nav_concerts:     'Konzerte',
                nav_venues:       'Veranstaltungsorte',
                nav_contact:      'Kontakt',
                page_title:       'Kontakt',
                page_coming_soon: 'Inhalt folgt in Kürze.',
                footer_copy:      '© 2026 infoConcert.lu',
                legal_cookies:    'Cookie-Richtlinie',
                legal_cgu:        'Nutzungsbedingungen',
                legal_protection: 'Datenschutz',
                cookie_banner_text: 'Wir verwenden Cookies, um Ihre ID und Ihr letztes Besuchsdatum zu speichern, damit wir Ihnen neue Konzerte anzeigen können. Es werden keine persönlichen Daten weitergegeben.',
                cookie_accept:    'Akzeptieren',
                cookie_decline:   'Ablehnen',
            }
        };

        const SUPPORTED_LANGS = ['fr', 'en', 'de'];

        function detectLang() {
            const saved = localStorage.getItem('lang');
            if (saved && SUPPORTED_LANGS.includes(saved)) return saved;
            const navLangs = navigator.languages || [navigator.language || 'fr'];
            for (const l of navLangs) {
                const code = l.split('-')[0].toLowerCase();
                if (SUPPORTED_LANGS.includes(code)) return code;
            }
            return 'fr';
        }

        let currentLang = detectLang();

        function t(key) {
            return (TRANSLATIONS[currentLang] || TRANSLATIONS.fr)[key] || key;
        }

        function applyTranslations() {
            document.getElementById('html-root').lang = currentLang;
            document.title = t('site_title');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const val = t(el.dataset.i18n);
                if (val !== el.dataset.i18n) el.innerHTML = val;
            });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLang);
            });
            updateCookieBannerTexts();
        }

        function switchLang(lang) {
            if (!SUPPORTED_LANGS.includes(lang)) return;
            currentLang = lang;
            localStorage.setItem('lang', lang);
            applyTranslations();
        }

        document.getElementById('lang-switcher').addEventListener('click', e => {
            const btn = e.target.closest('.lang-btn');
            if (btn) switchLang(btn.dataset.lang);
        });

        // Cookie banner
        let cookieConsent = getCookie('ic_consent');

        function updateCookieBannerTexts() {
            const bannerText = document.getElementById('cookie-banner-text');
            const btnAccept  = document.getElementById('cookie-btn-accept');
            const btnDecline = document.getElementById('cookie-btn-decline');
            if (bannerText) bannerText.textContent = t('cookie_banner_text');
            if (btnAccept)  btnAccept.textContent  = t('cookie_accept');
            if (btnDecline) btnDecline.textContent  = t('cookie_decline');
        }

        function closeCookieBanner() {
            const banner = document.getElementById('cookie-banner');
            if (banner) banner.style.display = 'none';
        }

        document.getElementById('cookie-btn-accept').addEventListener('click', () => {
            setCookie('ic_consent', 'true', 365);
            setCookie('ic_uid', generateUID(), 365);
            setCookie('ic_last_visit', new Date().toISOString(), 365);
            cookieConsent = 'true';
            closeCookieBanner();
        });

        document.getElementById('cookie-btn-decline').addEventListener('click', () => {
            setCookie('ic_consent', 'false', 365);
            cookieConsent = 'false';
            closeCookieBanner();
        });

        if (cookieConsent === null) {
            updateCookieBannerTexts();
            document.getElementById('cookie-banner').style.display = 'flex';
        }

        applyTranslations();
    </script>
</body>
</html>
