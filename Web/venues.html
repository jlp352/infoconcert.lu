<!DOCTYPE html>
<html lang="fr" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="site_title">infoConcert.lu – Lieux</title>
    <link rel="icon" type="image/svg+xml" href="image/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF3366;
            --secondary: #FFD700;
            --dark: #0A0A0A;
            --gray: #1A1A1A;
            --light: #F5F5F5;
            --accent: #00D9FF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            color: var(--light);
            overflow-x: hidden;
        }

        /* Background animation */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.03;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 35px, var(--primary) 35px, var(--primary) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, var(--secondary) 35px, var(--secondary) 70px);
            animation: patternMove 60s linear infinite;
        }

        @keyframes patternMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(70px, 70px); }
        }

        /* Header */
        header {
            position: relative;
            padding: 2rem;
            background: linear-gradient(135deg, var(--gray) 0%, var(--dark) 100%);
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 10px 40px rgba(255, 51, 102, 0.2);
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--light);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            position: relative;
            transition: color 0.3s;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }

        nav a:hover { color: var(--primary); }
        nav a:hover::after { width: 100%; }

        nav a.active {
            color: var(--primary);
        }

        nav a.active::after {
            width: 100%;
        }

        /* Language switcher */
        .lang-switcher-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .lang-switcher {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .lang-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--light);
            border-radius: 20px;
            padding: 0.35rem 0.85rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .lang-btn.active {
            border-color: var(--accent);
            background: rgba(0, 217, 255, 0.15);
            color: var(--accent);
        }

        /* ── Venues page main ── */
        .venues-main {
            position: relative;
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem 6rem;
        }

        /* Page title */
        .venues-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 7vw, 6rem);
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: slideDown 0.8s ease-out;
            text-align: center;
        }

        .venues-subtitle {
            text-align: center;
            opacity: 0.5;
            font-size: 1rem;
            margin-bottom: 3rem;
            animation: fadeInSub 0.8s ease-out 0.2s both;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInSub {
            from { opacity: 0; }
            to   { opacity: 0.5; }
        }

        /* ── Filter buttons ── */
        .venues-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 3.5rem;
        }

        .filter-btn {
            padding: 0.6rem 1.5rem;
            background: transparent;
            color: var(--light);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(255, 51, 102, 0.1);
        }

        /* ── Venue cards grid ── */
        .venues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 2rem;
        }

        /* Card */
        .venue-card {
            background: var(--gray);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.07);
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
            opacity: 0;
            transform: translateY(30px);
        }

        .venue-card.visible {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .venue-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(255, 51, 102, 0.2);
            border-color: rgba(255, 51, 102, 0.4);
        }

        .venue-card.highlight {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary), 0 20px 50px rgba(255, 51, 102, 0.3);
        }

        /* Card image */
        .venue-img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        .venue-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .venue-card:hover .venue-img-wrap img {
            transform: scale(1.06);
        }

        .venue-img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(10,10,10,0.85) 100%);
        }

        /* Card body */
        .venue-body {
            padding: 1.5rem;
        }

        .venue-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
            line-height: 1;
        }

        .venue-desc {
            font-size: 0.92rem;
            line-height: 1.7;
            opacity: 0.8;
            margin-bottom: 1.2rem;
        }

        .venue-address {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            line-height: 1.6;
            opacity: 0.75;
        }

        .venue-address .pin {
            font-size: 1rem;
            margin-top: 0.1rem;
            flex-shrink: 0;
        }

        /* GPS navigation button */
        .venue-nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            margin: 1rem auto 0;
            width: fit-content;
            padding: 0.55rem 1.2rem;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .venue-nav-btn:hover {
            background: rgba(0, 217, 255, 0.12);
            box-shadow: 0 0 16px rgba(0, 217, 255, 0.25);
            transform: translateY(-2px);
        }

        .venue-nav-btn svg {
            flex-shrink: 0;
        }

        /* Footer image attribution */
        .footer-attribution {
            max-width: 1400px;
            margin: 0 auto 0;
            padding: 1.2rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.45;
            line-height: 1.6;
        }

        .footer-attribution a {
            color: rgba(245,245,245,0.65);
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: color 0.2s;
        }

        .footer-attribution a:hover { color: var(--accent); opacity: 1; }

        /* Footer */
        footer {
            position: relative;
            padding: 0 0 2rem;
            text-align: center;
            background: var(--dark);
        }

        footer p {
            opacity: 0.6;
            font-size: 0.9rem;
        }

        .footer-sep {
            margin: 0 0.6rem;
            opacity: 0.4;
        }

        .footer-legal {
            background: var(--dark);
            padding: 1.8rem 2rem 1.4rem;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .footer-legal a {
            color: rgba(245,245,245,0.5);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .footer-legal a:hover { color: var(--primary); }

        /* Cookie banner */
        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2000;
            background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
            border-top: 3px solid var(--primary);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            flex-wrap: wrap;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            animation: slideUpBanner 0.4s ease-out;
        }

        @keyframes slideUpBanner {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .cookie-banner-text {
            flex: 1;
            min-width: 220px;
            font-size: 0.88rem;
            line-height: 1.5;
            opacity: 0.85;
        }

        .cookie-banner-text strong { color: var(--accent); font-size: 0.95rem; }

        .cookie-banner-btns { display: flex; gap: 0.75rem; flex-shrink: 0; }

        .cookie-btn-accept {
            padding: 0.6rem 1.6rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
        }

        .cookie-btn-accept:hover { background: #ff5580; transform: translateY(-2px); }

        .cookie-btn-decline {
            padding: 0.6rem 1.6rem;
            background: transparent;
            color: var(--light);
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
        }

        .cookie-btn-decline:hover { border-color: var(--light); }

        /* Mobile */
        @media (max-width: 768px) {
            header { padding: 1rem; }
            .logo img { height: 55px !important; }
            nav ul { width: 100%; justify-content: center; gap: 0.75rem; }
            .venues-grid { grid-template-columns: 1fr; }
            .venues-content { padding: 2rem 1rem 4rem; }
            .cookie-banner {
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
                padding: 1.2rem 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <header>
        <nav>
            <a href="index.html" class="logo"><img src="image/logo/Logo.png" alt="infoConcert.lu" style="height:90px;width:auto;display:block;"></a>
            <ul>
                <li><a href="index.html" data-i18n="nav_concerts">Concerts</a></li>
                <li><a href="venues.html" class="active" data-i18n="nav_venues">Lieux</a></li>
                <li><a href="contact.html" data-i18n="nav_contact">Contact</a></li>
            </ul>
            <div class="lang-switcher-wrapper">
                <div class="lang-switcher" id="lang-switcher">
                    <button class="lang-btn" data-lang="fr">FR</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="de">DE</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="venues-main">
        <h1 class="venues-title" data-i18n="page_title">Lieux</h1>
        <p class="venues-subtitle" data-i18n="page_subtitle">Les scènes musicales du Luxembourg</p>

        <!-- Filter buttons -->
        <div class="venues-filters" id="venues-filters"></div>

        <!-- Venue cards -->
        <div class="venues-grid" id="venues-grid"></div>
    </main>

    <footer>
        <p class="footer-attribution" data-i18n="img_attribution"></p>
        <div class="footer-legal">
            <a href="legalnotice.html#cookies" data-i18n="legal_cookies">Charte des cookies</a>
            <span class="footer-sep">·</span>
            <a href="legalnotice.html#cgu" data-i18n="legal_cgu">Conditions d'utilisation (CGU) du site</a>
            <span class="footer-sep">·</span>
            <a href="legalnotice.html#protection" data-i18n="legal_protection">Protection des données à caractère personnel</a>
        </div>
        <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 0 2rem;">
        <p data-i18n="footer_copy" style="padding-top: 1.5rem;">&copy; 2026 infoConcert.lu</p>
    </footer>

    <!-- Cookie consent banner -->
    <div class="cookie-banner" id="cookie-banner" style="display:none;">
        <div class="cookie-banner-text">
            <strong>🍪 Cookies</strong><br>
            <span id="cookie-banner-text"></span>
        </div>
        <div class="cookie-banner-btns">
            <button class="cookie-btn-accept" id="cookie-btn-accept"></button>
            <button class="cookie-btn-decline" id="cookie-btn-decline"></button>
        </div>
    </div>

    <script>
        // ── Cookie helpers ──────────────────────────────────────────────────────
        function setCookie(name, value, days) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = `${name}=${encodeURIComponent(value)};expires=${expires};path=/;SameSite=Lax`;
        }

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
            return match ? decodeURIComponent(match[1]) : null;
        }

        function generateUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        // ── Translations ────────────────────────────────────────────────────────
        const TRANSLATIONS = {
            fr: {
                site_title:       'infoConcert.lu – Lieux',
                nav_concerts:     'Concerts',
                nav_venues:       'Lieux',
                nav_contact:      'Contact',
                page_title:       'Lieux',
                page_subtitle:    'Les scènes musicales du Luxembourg',
                filter_all:       'Tous',
                footer_copy:      '© 2026 infoConcert.lu',
                legal_cookies:    'Charte des cookies',
                legal_cgu:        'Conditions d\'utilisation (CGU) du site',
                legal_protection: 'Protection des données à caractère personnel',
                img_attribution:  '⚠️ Avertissement : Les images proviennent du site <a href="https://commons.wikimedia.org/wiki/Main_Page" target="_blank" rel="noopener">Wikimedia Commons</a> et sont libres de droits ou sous licence <a href="https://creativecommons.org/licenses/" target="_blank" rel="noopener">Creative Commons</a>.',
                nav_gps:          'Naviguez vers ce lieu',
                cookie_banner_text: 'Nous utilisons des cookies pour mémoriser votre identifiant et la date de votre dernière visite, afin de vous afficher les nouveaux concerts. Aucune donnée personnelle n\'est partagée.',
                cookie_accept:    'Accepter',
                cookie_decline:   'Refuser',
            },
            en: {
                site_title:       'infoConcert.lu – Venues',
                nav_concerts:     'Concerts',
                nav_venues:       'Venues',
                nav_contact:      'Contact',
                page_title:       'Venues',
                page_subtitle:    'Luxembourg\'s music stages',
                filter_all:       'All',
                footer_copy:      '© 2026 infoConcert.lu',
                legal_cookies:    'Cookie Policy',
                legal_cgu:        'Terms of Use',
                legal_protection: 'Personal Data Protection',
                img_attribution:  '⚠️ Notice: Images are sourced from <a href="https://commons.wikimedia.org/wiki/Main_Page" target="_blank" rel="noopener">Wikimedia Commons</a> and are either in the public domain or licensed under <a href="https://creativecommons.org/licenses/" target="_blank" rel="noopener">Creative Commons</a>.',
                nav_gps:          'Navigate to venue',
                cookie_banner_text: 'We use cookies to remember your ID and your last visit date, so we can show you new concerts. No personal data is shared.',
                cookie_accept:    'Accept',
                cookie_decline:   'Decline',
            },
            de: {
                site_title:       'infoConcert.lu – Veranstaltungsorte',
                nav_concerts:     'Konzerte',
                nav_venues:       'Veranstaltungsorte',
                nav_contact:      'Kontakt',
                page_title:       'Veranstaltungsorte',
                page_subtitle:    'Luxemburgs Musikbühnen',
                filter_all:       'Alle',
                footer_copy:      '© 2026 infoConcert.lu',
                legal_cookies:    'Cookie-Richtlinie',
                legal_cgu:        'Nutzungsbedingungen',
                legal_protection: 'Datenschutz',
                img_attribution:  '⚠️ Hinweis: Die Bilder stammen von <a href="https://commons.wikimedia.org/wiki/Main_Page" target="_blank" rel="noopener">Wikimedia Commons</a> und sind gemeinfrei oder stehen unter einer <a href="https://creativecommons.org/licenses/" target="_blank" rel="noopener">Creative-Commons-Lizenz</a>.',
                nav_gps:          'Zum Veranstaltungsort navigieren',
                cookie_banner_text: 'Wir verwenden Cookies, um Ihre ID und Ihr letztes Besuchsdatum zu speichern, damit wir Ihnen neue Konzerte anzeigen können. Es werden keine persönlichen Daten weitergegeben.',
                cookie_accept:    'Akzeptieren',
                cookie_decline:   'Ablehnen',
            }
        };

        const SUPPORTED_LANGS = ['fr', 'en', 'de'];

        function detectLang() {
            const saved = localStorage.getItem('lang');
            if (saved && SUPPORTED_LANGS.includes(saved)) return saved;
            const navLangs = navigator.languages || [navigator.language || 'fr'];
            for (const l of navLangs) {
                const code = l.split('-')[0].toLowerCase();
                if (SUPPORTED_LANGS.includes(code)) return code;
            }
            return 'fr';
        }

        let currentLang = detectLang();

        function t(key) {
            return (TRANSLATIONS[currentLang] || TRANSLATIONS.fr)[key] || key;
        }

        function applyTranslations() {
            document.getElementById('html-root').lang = currentLang;
            document.title = t('site_title');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const val = t(el.dataset.i18n);
                if (val !== el.dataset.i18n) el.innerHTML = val;
            });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLang);
            });
            // Update "Tous/All/Alle" filter button
            const allBtn = document.querySelector('.filter-btn[data-id="all"]');
            if (allBtn) allBtn.textContent = t('filter_all');
            updateCookieBannerTexts();
        }

        function switchLang(lang) {
            if (!SUPPORTED_LANGS.includes(lang)) return;
            currentLang = lang;
            localStorage.setItem('lang', lang);
            renderCards();
            initAnimations();
            applyTranslations();
        }

        document.getElementById('lang-switcher').addEventListener('click', e => {
            const btn = e.target.closest('.lang-btn');
            if (btn) switchLang(btn.dataset.lang);
        });

        // ── Venue data ──────────────────────────────────────────────────────────
        const VENUES = [
            {
                id: 'rockhal',
                name: 'Rockhal',
                image: 'image/location/rockhal.png',
                desc: {

                    en: 'Rockhal is <strong>Luxembourg\'s iconic music venue</strong> since it opened in 2005, at the heart of the Belval cultural district. With three spaces – the Main Hall (up to 6,500 people), the Club (1,200) and The Floor (200) – it welcomes all styles, from rock to electronic, hip-hop to pop. Beyond concerts, Rockhal is also a cultural hub: its Rocklab supports local artists and helps nurture new musical careers.',

        // ── Render filters ───────────────────────────────────────────────────────
        function renderFilters() {
            const container = document.getElementById('venues-filters');
            const allBtn = `<button class="filter-btn active" data-id="all">${t('filter_all')}</button>`;
            const venuesBtns = VENUES.map(v =>
                `<button class="filter-btn" data-id="${v.id}">${v.name}</button>`
            ).join('');
            container.innerHTML = allBtn + venuesBtns;

            container.addEventListener('click', e => {
                const btn = e.target.closest('.filter-btn');
                if (!btn) return;
                const id = btn.dataset.id;

                // Update active state
                container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (id === 'all') {
                    // Remove all highlights
                    document.querySelectorAll('.venue-card').forEach(c => c.classList.remove('highlight'));
                    // Scroll to top of grid
                    document.getElementById('venues-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    // Highlight the targeted card and scroll to it
                    document.querySelectorAll('.venue-card').forEach(c => c.classList.remove('highlight'));
                    const card = document.querySelector(`.venue-card[data-id="${id}"]`);
                    if (card) {
                        card.classList.add('highlight');
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
        }

        // ── Render cards ─────────────────────────────────────────────────────────
        function renderCards() {
            const grid = document.getElementById('venues-grid');
            grid.innerHTML = VENUES.map(v => {
                const desc = v.desc[currentLang] || v.desc.fr;
                const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${v.gps[0]},${v.gps[1]}`;
                return `
                <article class="venue-card" data-id="${v.id}">
                    <div class="venue-img-wrap">
                        <img src="${v.image}" alt="${v.name}" loading="lazy">
                        <div class="venue-img-overlay"></div>
                    </div>
                    <div class="venue-body">
                        <h2 class="venue-name">${v.name}</h2>
                        <p class="venue-desc">${desc}</p>
                        <div class="venue-address">
                            <span class="pin">📍</span>
                            <span>${v.address.join('<br>')}</span>
                        </div>
                        <a href="${mapsUrl}" target="_blank" rel="noopener" class="venue-nav-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="3 11 22 2 13 21 11 13 3 11"/>
                            </svg>
                            ${t('nav_gps')}
                        </a>
                    </div>
                </article>
            `}).join('');
        }

        // ── IntersectionObserver for card animations ─────────────────────────────
        function initAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, i) => {
                    if (entry.isIntersecting) {
                        // Staggered delay based on position in grid
                        const cards = Array.from(document.querySelectorAll('.venue-card'));
                        const idx = cards.indexOf(entry.target);
                        entry.target.style.animationDelay = `${(idx % 3) * 0.1}s`;
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.venue-card').forEach(card => observer.observe(card));
        }

        // ── Cookie banner ────────────────────────────────────────────────────────
        let cookieConsent = getCookie('ic_consent');

        function updateCookieBannerTexts() {
            const bannerText = document.getElementById('cookie-banner-text');
            const btnAccept  = document.getElementById('cookie-btn-accept');
            const btnDecline = document.getElementById('cookie-btn-decline');
            if (bannerText) bannerText.textContent = t('cookie_banner_text');
            if (btnAccept)  btnAccept.textContent  = t('cookie_accept');
            if (btnDecline) btnDecline.textContent  = t('cookie_decline');
        }

        function closeCookieBanner() {
            const banner = document.getElementById('cookie-banner');
            if (banner) banner.style.display = 'none';
        }

        document.getElementById('cookie-btn-accept').addEventListener('click', () => {
            setCookie('ic_consent', 'true', 365);
            setCookie('ic_uid', generateUID(), 365);
            setCookie('ic_last_visit', new Date().toISOString(), 365);
            cookieConsent = 'true';
            closeCookieBanner();
        });

        document.getElementById('cookie-btn-decline').addEventListener('click', () => {
            setCookie('ic_consent', 'false', 365);
            cookieConsent = 'false';
            closeCookieBanner();
        });

        if (cookieConsent === null) {
            updateCookieBannerTexts();
            document.getElementById('cookie-banner').style.display = 'flex';
        }

        // ── Init ─────────────────────────────────────────────────────────────────
        renderFilters();
        renderCards();
        initAnimations();
        applyTranslations();
    </script>
